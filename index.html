<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupe du Monde 2026 - Calendrier Interactif</title>
    <style>
        /* Styles généraux */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1200px;
            justify-content: center;
        }

        /* Style de la carte d'un Groupe */
        .group-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 15px;
            width: 320px;
        }

        .group-letter {
            font-size: 28px;
            font-weight: bold;
            color: #002366;
            text-align: center;
            margin-bottom: 15px;
        }

        /* Style d'une ligne de match */
        .match-row {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eaeaea;
        }
        
        .match-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .date-time {
            font-size: 11px;
            color: #888;
            text-align: center;
            margin-bottom: 5px;
            display: block;
        }

        .teams-scores {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .team {
            font-size: 14px;
            font-weight: bold;
            width: 80px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .team.right {
            justify-content: flex-end;
        }

        /* Champs de saisie pour les scores */
        .score-input {
            width: 35px;
            height: 25px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #f9f9f9;
        }

        .score-input:focus {
            outline: none;
            border-color: #002366;
            background-color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="group-card">
            <div class="group-letter">A</div>
            
            <div class="match-row">
                <span class="date-time">11/06 21:00</span>
                <div class="teams-scores">
                    <span class="team">🇲🇽 MEX</span>
                    <input type="number" min="0" class="score-input">
                    <input type="number" min="0" class="score-input">
                    <span class="team right">RSA 🇿🇦</span>
                </div>
            </div>

            <div class="match-row">
                <span class="date-time">12/06 04:00</span>
                <div class="teams-scores">
                    <span class="team">🇰🇷 KOR</span>
                    <input type="number" min="0" class="score-input">
                    <input type="number" min="0" class="score-input">
                    <span class="team right">TBD ❔</span>
                </div>
            </div>
            
            <div class="match-row">
                <span class="date-time">18/06 18:00</span>
                <div class="teams-scores">
                    <span class="team">❔ TBD</span>
                    <input type="number" min="0" class="score-input">
                    <input type="number" min="0" class="score-input">
                    <span class="team right">RSA 🇿🇦</span>
                </div>
            </div>
        </div>
        <div class="group-card">
            <div class="group-letter">B</div>
            
            <div class="match-row">
                <span class="date-time">12/06 21:00</span>
                <div class="teams-scores">
                    <span class="team">🇨🇦 CAN</span>
                    <input type="number" min="0" class="score-input">
                    <input type="number" min="0" class="score-input">
                    <span class="team right">TBD ❔</span>
                </div>
            </div>
        </div>
        </div>

</body>
</html>
