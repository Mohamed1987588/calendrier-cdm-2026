<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Footmarket | Coupe du Monde 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .bracket-box { background: #1e293b; border: 1px solid #334155; padding: 8px; border-radius: 6px; width: 140px; }
        .b-input { width: 100%; font-size: 0.7rem; font-weight: 800; background: transparent; color: white; outline: none; text-transform: uppercase; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-center gap-4 mb-8">
        <button onclick="showPage('page-finale')" class="px-4 py-2 bg-emerald-600 rounded">Tableau Final</button>
        <button onclick="showPage('page-groupes')" class="px-4 py-2 bg-slate-700 rounded">Groupes</button>
        <button onclick="showPage('page-joueurs')" class="px-4 py-2 bg-slate-700 rounded">Joueurs</button>
    </div>

    <div id="page-finale" class="page-content active">
        <div class="overflow-x-auto">
            <div class="flex gap-4 justify-center">
                <div class="bracket-box">
                    <div class="text-[9px] text-slate-400">Match 1</div>
                    <input type="text" class="b-input" placeholder="Équipe 1">
                    <hr class="my-1 border-slate-600">
                    <input type="text" class="b-input" placeholder="Équipe 2">
                </div>
                </div>
        </div>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        // Aucune logique de calcul ou de croisement automatique ici.
    </script>
</body>
</html>
