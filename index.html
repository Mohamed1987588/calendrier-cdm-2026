<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footmarket | Simulateur Coupe du Monde 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        /* Style tableau manuel */
        .bracket-box { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 6px; width: 140px; }
        .bracket-input { width: 100%; background: #0f172a; border: 1px solid #475569; padding: 4px; color: white; font-size: 11px; text-transform: uppercase; border-radius: 4px; }
    </style>
</head>
<body class="p-6">

    <div class="flex justify-center gap-4 mb-10">
        <button onclick="show('finale')" class="bg-emerald-600 px-6 py-2 rounded font-bold hover:bg-emerald-500">Tableau Final</button>
        <button onclick="show('groupes')" class="bg-slate-700 px-6 py-2 rounded font-bold hover:bg-slate-600">Calendrier & Groupes</button>
        <button onclick="show('joueurs')" class="bg-slate-700 px-6 py-2 rounded font-bold hover:bg-slate-600">Base Joueurs</button>
    </div>

    <div id="finale" class="tab-content active">
        <h2 class="text-2xl font-black text-center mb-10 text-white uppercase">Tableau Final</h2>
        <div class="flex justify-center gap-4 overflow-x-auto pb-10">
            <div class="bracket-box shrink-0">
                <p class="text-[9px] text-slate-400 font-bold mb-1">MATCH 73</p>
                <input type="text" class="bracket-input" placeholder="Équipe 1">
                <hr class="my-1 border-slate-600">
                <input type="text" class="bracket-input" placeholder="Équipe 2">
            </div>
            </div>
    </div>

    <div id="groupes" class="tab-content">
        <h2 class="text-2xl font-black text-center mb-6 text-white">Calendrier & Groupes</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-white text-slate-900 p-4 rounded text-sm">
                <h3 class="font-bold border-b mb-2">Groupe A</h3>
                <p>MEX vs RSA | 11/06</p>
                <p>KOR vs CZE | 12/06</p>
            </div>
            </div>
    </div>

    <div id="joueurs" class="tab-content">
        <input type="text" id="search" oninput="filter()" placeholder="Rechercher joueur, pays..." class="w-full p-3 mb-6 text-black rounded">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>

    <script>
        function show(id) {
            document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- Votre logique CSV existante reste ici intacte ---
        // Ajoutez votre fonction chargerTousLesFichiersCSV() et renderPlayers() ici
    </script>
</body>
</html>
