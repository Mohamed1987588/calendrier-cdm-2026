<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupe du Monde 2026 - Groupes</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 10px;
            margin: 0;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: #002366;
            margin: 0 0 10px 0;
            font-size: 2.5em;
        }
        .header p {
            color: #666;
            margin: 0;
            font-size: 1.2em;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            max-width: 1400px;
            justify-content: center;
        }
        .group-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 20px;
            width: 310px;
        }
        .group-letter {
            font-size: 32px;
            font-weight: 900;
            color: #002366;
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f2f5;
        }
        .match-row {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f9f9f9;
        }
        .match-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .date-time {
            font-size: 11px;
            color: #999;
            text-align: center;
            margin-bottom: 8px;
            display: block;
            font-weight: bold;
        }
        .teams-scores {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .team {
            font-size: 16px;
            font-weight: bold;
            width: 75px;
            display: flex;
            align-items: center;
            color: #222;
        }
        .team.right {
            justify-content: flex-end;
            text-align: right;
        }
        .score-input {
            width: 38px;
            height: 28px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid #ddd;
            border-radius: 6px;
            background-color: #fafafa;
            margin: 0 6px;
            transition: all 0.2s;
            -moz-appearance: textfield;
        }
        /* Cacher les flèches dans les cases de score (navigateurs Webkit) */
        .score-input::-webkit-outer-spin-button,
        .score-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .score-input:focus {
            outline: none;
            border-color: #002366;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(0,35,102,0.1);
        }
        .scores-container {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Coupe du Monde 2026</h1>
        <p>Phase de Groupes (A - L) - Calendrier Remplissable</p>
    </div>

    <!-- Le conteneur où tous les groupes vont apparaître -->
    <div class="container" id="groups-container"></div>

            { group: 'A', date: '18/06 18:00', t1: 'TBD', t2: 'RSA' },

            { group: 'L', date: '17/06 22:00', t1: 'ENG', t2: 'CRO' },

            { group: 'L', date: '27/06 23:00', t1: 'PAN', t2: 'ENG' },
            { group: 'L', date: '27/06 23:00', t1: 'CRO', t2: 'GHA' }
        ];

        const container = document.getElementById('groups-container');
        const groups = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];

        // Boucle pour créer chaque groupe
        groups.forEach(groupLetter => {
            const card = document.createElement('div');
            card.className = 'group-card';
            
            const title = document.createElement('div');
            title.className = 'group-letter';
            title.textContent = groupLetter;
            card.appendChild(title);

            const groupMatches = allMatches.filter(m => m.group === groupLetter);

            groupMatches.forEach(match => {
                const matchHTML = `
                    <div class="match-row">
                        <span class="date-time">${match.date}</span>
                        <div class="teams-scores">
                            <span class="team">${match.t1}</span>
                            <div class="scores-container">
                                <input type="number" min="0" class="score-input">
                                <input type="number" min="0" class="score-input">
                            </div>
                            <span class="team right">${match.t2}</span>
                        </div>
                    </div>
                `;
                card.innerHTML += matchHTML;
            });

            container.appendChild(card);
        });
    </script>
</body>
</html>
